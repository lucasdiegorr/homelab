---
- name: Install k3s
  shell:
    cmd: >
      curl -sfL https://get.k3s.io |
      INSTALL_K3S_VERSION={{ k3s_version }}
      sh -
    creates: /usr/local/bin/k3s
  environment:
    INSTALL_K3S_EXEC: server
  register: k3s_install

- name: Wait for k3s to be ready
  command:
    cmd: kubectl wait --for=condition=Ready node/{{ hostname }} --timeout=120s
  changed_when: no
  when: k3s_install.changed

- name: Set kubeconfig permissions
  file:
    path: /etc/rancher/k3s/k3s.yaml
    mode: "0644"
    owner: root
    group: root

- name: Create kubeconfig symlink for user
  file:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "/home/{{ username }}/.kube/config"
    state: link
    owner: "{{ username }}"
    group: "{{ username }}"
  become: yes
  become_user: "{{ username }}"

- name: Install Helm via Homebrew
  community.general.homebrew:
    name: helm
    state: present
  become: yes
  become_user: "{{ username }}"

- name: Install ArgoCD CLI
  shell:
    cmd: curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64 && chmod +x /usr/local/bin/argocd
    creates: /usr/local/bin/argocd
