apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`lucasrocha.dpdns.org`) && PathPrefix(`/nextcloud`)
      kind: Rule
      middlewares:
        - name: strip-nextcloud
      services:
        - name: nextcloud
          port: 80
  tls:
    certResolver: letsencrypt
