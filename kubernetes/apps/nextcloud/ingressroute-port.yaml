apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  entryPoints:
    - web-nextcloud
  routes:
    - match: Host(`nextcloud.lucasrocha.dpdns.org`) && PathPrefix(`/`)
      kind: Rule
      services:
        - name: nextcloud
          port: 80
