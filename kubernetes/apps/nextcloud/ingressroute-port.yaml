apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  entryPoints:
    - web-nextcloud
  routes:
    - match: PathPrefix(`/`)
      kind: Rule
      middlewares:
        - name: strip-nextcloud
        - name: https-proto
      services:
        - name: nextcloud
          port: 80
