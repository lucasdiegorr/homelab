apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-nextcloud
  namespace: nextcloud
spec:
  stripPrefix:
    prefixes:
      - /nextcloud
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: https-proto
  namespace: nextcloud
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"
