apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: kube-system
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: http-redirect
  namespace: kube-system
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`lucasrocha.dpdns.org`)
      kind: Rule
      middlewares:
        - name: redirect-to-https
      services:
        - name: noop@internal
          kind: TraefikService
