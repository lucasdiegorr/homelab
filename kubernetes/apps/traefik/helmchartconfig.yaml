apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    ports:
      web-nextcloud:
        port: 8080
        expose:
          default: true
        exposedPort: 8080
        protocol: TCP
      web-n8n:
        port: 8081
        expose:
          default: true
        exposedPort: 8081
        protocol: TCP
      web-jellyfin:
        port: 8082
        expose:
          default: true
        exposedPort: 8082
        protocol: TCP
