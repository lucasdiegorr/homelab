apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: n8n
  namespace: n8n
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/n8n`)
      kind: Rule
      services:
        - name: n8n
          port: 5678
      middlewares:
        - name: strip-n8n
          namespace: n8n