apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: n8n-lan
  namespace: n8n
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`192.168.0.100`) && PathPrefix(`/n8n`)
      kind: Rule
      middlewares:
        - name: strip-n8n
      services:
        - name: n8n
          port: 5678
