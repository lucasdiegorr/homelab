apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hermes-lan
  namespace: hermes
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`192.168.0.100`) && PathPrefix(`/hermes-dashboard`)
      kind: Rule
      middlewares:
        - name: strip-hermes-dashboard
      services:
        - name: hermes
          port: 9119
    - match: Host(`192.168.0.100`) && PathPrefix(`/hermes`)
      kind: Rule
      middlewares:
        - name: strip-hermes
      services:
        - name: hermes
          port: 8642