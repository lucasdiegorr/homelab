apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-hermes
  namespace: hermes
spec:
  stripPrefix:
    prefixes:
      - /hermes
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-hermes-dashboard
  namespace: hermes
spec:
  stripPrefix:
    prefixes:
      - /hermes-dashboard
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-hermes-webhook-telegram
  namespace: hermes
spec:
  stripPrefix:
    prefixes:
      - /hermes/webhook/telegram
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-hermes-webhook-whatsapp
  namespace: hermes
spec:
  stripPrefix:
    prefixes:
      - /hermes/webhook/whatsapp
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: https-proto
  namespace: hermes
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"