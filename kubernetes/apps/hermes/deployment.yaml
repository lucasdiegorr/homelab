apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      containers:
        - name: hermes
          image: nousresearch/hermes-agent:latest
          args: ["gateway", "run"]
          ports:
            - containerPort: 8642
              name: api
            - containerPort: 9119
              name: dashboard
          env:
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_HOST
              value: "0.0.0.0"
            - name: HERMES_DASHBOARD_PORT
              value: "9119"
            - name: HERMES_DASHBOARD_BASIC_AUTH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: dashboard-user
            - name: HERMES_DASHBOARD_BASIC_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: dashboard-pass
            - name: HERMES_DASHBOARD_BASIC_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: dashboard-secret
            - name: HERMES_DASHBOARD_INSECURE
              value: "1"
            - name: API_SERVER_ENABLED
              value: "false"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: CUSTOM_BASE_URL
              value: "https://openrouter.ai/api/v1"
          envFrom:
            - secretRef:
                name: hermes-secrets
                optional: true
          resources:
            requests:
              memory: "1Gi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          volumeMounts:
            - name: hermes-data
              mountPath: /opt/data
            - name: shm
              mountPath: /dev/shm
          livenessProbe:
            httpGet:
              path: /health
              port: 8642
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8642
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 10
      volumes:
        - name: hermes-data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: shm
          emptyDir:
            medium: Memory